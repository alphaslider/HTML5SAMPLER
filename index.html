<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GK_ULTRA // SUBZERO_UNIT // LOFI_REFRACTOR</title>
    <style>
        :root {
            --bg-obsidian: #05070a;
            --panel-steel: #161b22;
            --frost-trim: #30363d;
            --ice-cyan: #00e5ff;
            --electric-blue: #7df9ff;
            --whiteout: #ffffff;
            --rubber-pad: #0d1117;
        }

        body { 
            font-family: monospace; 
            background: var(--bg-obsidian); 
            color: var(--ice-cyan); 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px);
        }

        /* HARDWARE UI */
        .chassis { 
            background: var(--panel-steel);
            border: 4px double var(--frost-trim); /* Chunky 80s hardware border */
            border-radius: 4px; padding: 25px; width: 500px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05), 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
        }

        .screen-bezel {
            background: #080a0c; padding: 15px; border-radius: 2px;
            border: 1px solid var(--frost-trim); margin-bottom: 25px;
            box-shadow: inset 0 0 20px #000;
        }

        #preview { 
            width: 100%; height: 35px;
            filter: invert(0.9) sepia(1) saturate(5) hue-rotate(190deg);
            opacity: 0.8; margin-top: 10px;
        }

        /* CONTROLS */
        .control-deck { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 4px; }
        
        select, button {
            background: var(--rubber-pad);
            color: var(--ice-cyan);
            border: 1px solid var(--frost-trim);
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
        }

        select { padding: 8px; font-size: 11px; width: 100%; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button { 
            padding: 12px; font-size: 10px; 
            box-shadow: 0 3px 0 #000; position: relative; 
        }

        button:active { top: 2px; box-shadow: 0 1px 0 #000; }
        
        #exportBtn { grid-column: span 2; background: #1c2128; color: var(--electric-blue); }

        .status-light {
            float: right; width: 10px; height: 10px;
            background: #112233; border-radius: 50%;
        }
        .status-active { background: var(--whiteout); box-shadow: 0 0 10px var(--ice-cyan); }

        .label { font-size: 9px; color: #8b949e; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="chassis">
    <h2>GK_ULTRA <span style="font-size:10px; opacity:0.5;">LOFI_CORE</span> <div id="recLight" class="status-light"></div></h2>
    
    <div class="screen-bezel">
        <div style="font-size: 10px;">SIGNAL_PATH: <span id="gradeDisplay">ACTIVE</span></div>
        <audio id="preview" controls></audio>
    </div>

    <div class="control-deck">
        <span class="label">DESTRUCTION_GRADE</span>
        <select id="sampleGrade">
            <option value="hifi" selected>CLEAN (16-BIT / RAW)</option>
            <option value="lofi1">VINTAGE (12-BIT / 22kHz)</option>
            <option value="lofi2">CRUSHED (8-BIT / 11kHz)</option>
            <option value="grit">ULTRA_LOFI (4-BIT / 4kHz)</option>
        </select>

        <div class="btn-row">
            <button id="recordBtn">ARM & CAPTURE</button>
            <button id="stopBtn" disabled>CUT SIGNAL</button>
            <button id="exportBtn" disabled>SAVE_TO_DISK</button>
        </div>
    </div>
</div>

<script>
    let audioCtx, stream, source, processor;
    let leftChannel = [], rightChannel = [];
    let recording = false;

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportBtn');
    const gradeSelector = document.getElementById('sampleGrade');
    const preview = document.getElementById('preview');
    const recLight = document.getElementById('recLight');

    recordBtn.onclick = async () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            // BUG FIX: Disabled all browser audio processing for a true direct stream
            stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true, 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false,
                    autoGainControl: false 
                } 
            });
            
            const audioStream = new MediaStream(stream.getAudioTracks());
            source = audioCtx.createMediaStreamSource(audioStream);
            processor = audioCtx.createScriptProcessor(4096, 2, 2);
            
            source.connect(processor);
            processor.connect(audioCtx.destination); 

            leftChannel = []; 
            rightChannel = [];
            recording = true;

            processor.onaudioprocess = (e) => {
                if (!recording) return;
                leftChannel.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                rightChannel.push(new Float32Array(e.inputBuffer.getChannelData(1)));
            };

            recordBtn.innerText = "CAPTURING...";
            recordBtn.disabled = true;
            stopBtn.disabled = false;
            recLight.classList.add('status-active');
        } catch (err) { alert("Enable audio sharing in the popup."); }
    };

    stopBtn.onclick = () => {
        recording = false;
        if(stream) stream.getTracks().forEach(t => t.stop());
        if(processor) processor.disconnect();
        if(source) source.disconnect();
        
        const rawL = flattenArray(leftChannel);
        const rawR = flattenArray(rightChannel);
        
        // Process the audio
        const processed = applyGrade(rawL, rawR, gradeSelector.value);

        // Create the playable buffer
        const buffer = audioCtx.createBuffer(2, processed.l.length, processed.rate);
        buffer.copyToChannel(processed.l, 0);
        buffer.copyToChannel(processed.r, 1);
        
        preview.src = URL.createObjectURL(audioBufferToWav(buffer));
        window.lastRecordedBuffer = buffer;

        recordBtn.innerText = "ARM & CAPTURE";
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        exportBtn.disabled = false;
        recLight.classList.remove('status-active');
    };

    function applyGrade(l, r, grade) {
        let step = 1;
        let bitDepth = 16;
        let rate = audioCtx.sampleRate;

        if (grade === 'lofi1') { step = 2; bitDepth = 12; }
        else if (grade === 'lofi2') { step = 4; bitDepth = 8; }
        else if (grade === 'grit') { step = 11; bitDepth = 4; }

        const outL = new Float32Array(l.length);
        const outR = new Float32Array(r.length);
        const levels = Math.pow(2, bitDepth);

        // Sample and Hold + Bitcrushing logic
        for (let i = 0; i < l.length; i += step) {
            let valL = Math.round(l[i] * levels) / levels;
            let valR = Math.round(r[i] * levels) / levels;
            
            for (let j = 0; j < step && (i + j) < l.length; j++) {
                outL[i + j] = valL;
                outR[i + j] = valR;
            }
        }

        return { l: outL, r: outR, rate: rate };
    }

    function flattenArray(channel) {
        let result = new Float32Array(channel.length * 4096);
        for (let i = 0; i < channel.length; i++) result.set(channel[i], i * 4096);
        return result;
    }

    function audioBufferToWav(buffer) {
        let numOfChan = 2, length = buffer.length * 4 + 44, bufferArr = new ArrayBuffer(length), view = new DataView(bufferArr), pos = 0;
        const setU16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
        const setU32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        setU32(0x46464952); setU32(length - 8); setU32(0x45564157); setU32(0x20746d66); setU32(16); setU16(1); setU16(2);
        setU32(buffer.sampleRate); setU32(buffer.sampleRate * 4); setU16(4); setU16(16); setU32(0x61746164); setU32(length - pos - 4);
        for (let i = 0; i < buffer.length; i++) {
            for (let ch = 0; ch < 2; ch++) {
                let s = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true); pos += 2;
            }
        }
        return new Blob([view], { type: 'audio/wav' });
    }

    exportBtn.onclick = () => {
        const anchor = document.createElement('a');
        anchor.href = preview.src;
        anchor.download = `GK_ULTRA_${gradeSelector.value.toUpperCase()}.wav`;
        anchor.click();
    };
</script>
</body>
</html>
